name: coverage

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install Rust stable
        run: |
          rustup toolchain install stable --profile minimal --component llvm-tools-preview
          rustup default stable

      - name: Install cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked

      - name: Install diff-cover
        run: python3 -m pip install diff-cover

      - name: Check overall line coverage
        run: cargo llvm-cov -p motif-core --lcov --output-path target/llvm-cov.info --fail-under-lines 70

      - name: Check diff coverage
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }} --depth=1
          diff-cover target/llvm-cov.info --compare-branch=origin/${{ github.base_ref }} --fail-under=80
