<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>motif native variants demo</title>
    <link rel="stylesheet" href="./motif.css" />
    <style>
      body {
        margin: 0;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(180deg, #eef3ff 0%, #ffffff 100%);
        color: #1f1f1f;
      }

      .shell {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <section class="m-surface f-stack dark:m-elevation-1 ui-pad-xl ui-radius-lg ui-density-comfortable">
        <h1 class="f-text-primary">motif native variants</h1>
        <p class="ui-text-xs">Focus, hover, active and dark rules stay in one place while size is adjusted independently.</p>
        <button class="focus:m-ring hover:m-bg-hover-primary active:m-shadow-press ui-control-lg ui-radius-pill ui-density-compact">Native variants</button>
        <div class="ui-stack-inline ui-gap-xl">
          <input type="checkbox" class="f-checkbox" aria-label="Fluent checkbox" />
          <input type="radio" class="m-radio" aria-label="Material radio" />
          <button class="m-switch" aria-label="Material switch"></button>
        </div>
        <div class="ui-stack-center ui-text-xs">Preset + ui layer</div>
      </section>
    </main>
  </body>
</html>
